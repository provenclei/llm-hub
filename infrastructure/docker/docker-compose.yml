version: '3.8'

services:
  # API服务
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: llm-hub-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://llmhub:${POSTGRES_PASSWORD}@postgres:5432/llmhub
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - llm-hub-network
    restart: unless-stopped

  # 管理后台
  admin:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    container_name: llm-hub-admin
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - llm-hub-network
    restart: unless-stopped

  # 用户门户
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: llm-hub-web
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - llm-hub-network
    restart: unless-stopped

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: llm-hub-postgres
    environment:
      - POSTGRES_USER=llmhub
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=llmhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - llm-hub-network
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: llm-hub-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - llm-hub-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: llm-hub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - admin
      - web
    networks:
      - llm-hub-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  llm-hub-network:
    driver: bridge
